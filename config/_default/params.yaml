# SITE SETUP
# Guide: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Appearance
appearance:
  mode: system
  color: emerald

# SEO
marketing:
  seo:
    site_type: Person
    local_business_type: ''
    org_name: ''
    description: 'Yuchen Lin's Personal Website'
    twitter: ''
  analytics:
    google_analytics: 'G-HWZ6GXG1B5'
    baidu_tongji: ''
    plausible: ''
    fathom: ''
    pirsch: ''
  verification:
    google: 'ylv-ltIi7tu_LhHzX5iiY_x3yJqf_2tBku48k_WbPBM'
    baidu: ''

# Site header
header:
  navbar:
    enable: true
    blox: "navbar"
    fixed_to_top: true
    show_search: false
    show_theme_chooser: false
    align: right
    logo:
      text: "Yuchen Lin"
      filename: icons/cubes-solid.svg

# Site footer
footer:
  copyright:
    notice: 'Lastet Update: {month} {day}, {year} | Yuchen Lin'
    license:
      enable: true
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

# Localization
locale:
  date_format: 'Jan 2, 2006'
  time_format: '3:04 PM'

# Site features
features:
  math:
    enable: false
  privacy_pack:
    enable: false
